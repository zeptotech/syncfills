<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxSync</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #222228;
  --surface3: #2a2a32;
  --border: #2e2e38;
  --border2: #3a3a48;
  --ink: #e8e6f0;
  --ink-2: #9996b0;
  --ink-3: #5a5870;
  --green: #3dd68c;
  --green-dim: #1a3d2a;
  --amber: #f0a340;
  --amber-dim: #3d2a10;
  --red: #e85d5d;
  --red-dim: #3d1a1a;
  --blue: #5b8cf5;
  --blue-dim: #1a2550;
  --radius: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* GRID BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--surface) 1px, transparent 1px),
    linear-gradient(90deg, var(--surface) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  padding: 28px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(15,15,17,0.95);
  backdrop-filter: blur(8px);
}

.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  color: var(--ink);
}

.logo span {
  color: var(--green);
}

.logo-tag {
  font-size: 0.65rem;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  border: 1px solid var(--border2);
  padding: 3px 8px;
  border-radius: 3px;
}

/* MAIN */
main {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 24px 100px;
}

/* SECTION LABELS */
.sl {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-3);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sl::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--green);
  flex-shrink: 0;
}
.sl::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* PARAMS ROW */
.params {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 36px;
  display: flex;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
}

.field input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--ink);
  border-radius: var(--radius);
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(61,214,140,0.12);
}
.field input[type="number"] { width: 100px; }

.field-note {
  font-size: 0.6rem;
  color: var(--ink-3);
}

/* RX CARDS */
.rx-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.rx-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr 180px 160px 42px;
  gap: 16px;
  align-items: end;
  transition: border-color 0.2s;
  animation: cardIn 0.18s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.rx-card:hover { border-color: var(--border2); }

.rx-num-tag {
  font-size: 0.55rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--green);
  margin-bottom: 5px;
}

.rx-card input[type="text"] { width: 100%; }

.btn-x {
  width: 42px;
  height: 40px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--ink-3);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  align-self: flex-end;
}
.btn-x:hover {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

/* EMPTY */
.empty {
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  text-align: center;
  padding: 40px;
  color: var(--ink-3);
  font-size: 0.75rem;
  margin-bottom: 16px;
}
.empty-icon { font-size: 2rem; margin-bottom: 10px; display: block; }

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-bottom: 48px;
  flex-wrap: wrap;
}

.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 11px 22px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}

.btn-add {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--ink-2);
}
.btn-add:hover {
  background: var(--surface3);
  border-color: var(--green);
  color: var(--green);
}

.btn-calc {
  background: var(--green);
  color: #0a1f14;
  font-weight: 600;
  border-color: var(--green);
}
.btn-calc:hover {
  background: #4de89e;
}

.btn-reset {
  background: none;
  border-color: var(--border2);
  color: var(--ink-3);
}
.btn-reset:hover {
  border-color: var(--red);
  color: var(--red);
  background: var(--red-dim);
}

/* ERROR */
.error {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  color: var(--red);
  padding: 10px 16px;
  font-size: 0.75rem;
  margin-bottom: 16px;
  display: none;
}

/* RESULTS */
#results {
  display: none;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* SYNC OPPORTUNITY BLOCK */
.sync-opp {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  position: relative;
}

.sync-opp + .sync-opp {
  margin-top: 32px;
}

.opp-header {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.opp-num {
  font-size: 0.6rem;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.opp-date {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.opp-window {
  font-size: 0.7rem;
  color: var(--ink-3);
  margin-top: 2px;
}

.opp-badge {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 12px;
  border-radius: 99px;
}

.opp-badge.best {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(61,214,140,0.3);
}

.opp-badge.next {
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid rgba(91,140,245,0.3);
}

/* TABLE */
.opp-table {
  width: 100%;
  border-collapse: collapse;
}

.opp-table th {
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  padding: 10px 20px;
  text-align: left;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.opp-table td {
  padding: 14px 20px;
  font-size: 0.8rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.opp-table tr:last-child td { border-bottom: none; }

.opp-table tr.in-window td { background: rgba(61,214,140,0.03); }
.opp-table tr.short-fill td { background: rgba(240,163,64,0.03); }
.opp-table tr.future td { background: transparent; opacity: 0.55; }

.med-name {
  font-weight: 500;
  color: var(--ink);
}

.date-cell { color: var(--ink-2); }

.fill-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 4px 14px;
  border-radius: 99px;
}

.fill-pill.standard {
  background: var(--green-dim);
  color: var(--green);
}

.fill-pill.short {
  background: var(--amber-dim);
  color: var(--amber);
}

.fill-pill.skip {
  background: var(--surface3);
  color: var(--ink-3);
}

.fill-sub {
  font-size: 0.65rem;
  color: var(--ink-3);
  margin-top: 3px;
}

.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 6px;
}
.status-dot.green { background: var(--green); }
.status-dot.amber { background: var(--amber); }
.status-dot.grey  { background: var(--ink-3); }

/* SUMMARY */
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}

.sum-item {
  background: var(--surface);
  padding: 18px 20px;
  text-align: center;
}

.sum-val {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  margin-bottom: 5px;
}

.sum-val.amber { color: var(--amber); }

.sum-label {
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
}

.explain-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 28px;
  font-size: 0.75rem;
  color: var(--ink-2);
  line-height: 1.7;
}

.explain-box strong { color: var(--green); }

/* TIMELINE VISUAL */
.timeline-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 28px;
  overflow-x: auto;
}

.timeline-title {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  margin-bottom: 20px;
}

.tl-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.tl-name {
  font-size: 0.72rem;
  color: var(--ink-2);
  width: 160px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tl-bar-wrap {
  flex: 1;
  position: relative;
  height: 28px;
}

.tl-bar {
  position: absolute;
  top: 4px;
  height: 20px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 0.6rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
}

.tl-bar.current {
  background: var(--surface3);
  color: var(--ink-2);
  border: 1px solid var(--border2);
}

.tl-bar.synced {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(61,214,140,0.25);
}

.tl-sync-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--green);
  opacity: 0.7;
}

.tl-today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--ink-3);
  opacity: 0.5;
}

@media (max-width: 640px) {
  header { padding: 18px 20px; }
  .rx-card { grid-template-columns: 1fr 1fr; }
  .rx-card > *:first-child { grid-column: 1/-1; }
  .summary { grid-template-columns: 1fr 1fr; }
  main { padding: 32px 16px 80px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Rx<span>Sync</span></div>
  <div class="logo-tag">Sync Planner</div>
</header>

<main>

  <div class="sl">Parameters</div>
  <div class="params">
    <div class="field">
      <label>Grace Period (days)</label>
      <input type="number" id="grace" value="10" min="1" max="30">
      <div class="field-note">Early fill window before due date</div>
    </div>
    <div class="field">
      <label>Today's Date</label>
      <input type="date" id="today">
    </div>
  </div>

  <div class="sl">Prescriptions</div>
  <div class="rx-list" id="rxList"></div>
  <div class="empty" id="emptyState">
    <span class="empty-icon">💊</span>
    Add your prescriptions below to get started.
  </div>

  <div class="error" id="errMsg"></div>

  <div class="actions">
    <button class="btn btn-add" onclick="addRx()">+ Add Prescription</button>
    <button class="btn btn-calc" onclick="calculate()">▶ Calculate Sync Plan</button>
    <button class="btn btn-reset" onclick="clearAll()">✕ Clear</button>
  </div>

  <div id="results"></div>

</main>

<script>
let counter = 0;
const items = [];

// Set today's date
const todayDate = new Date();
todayDate.setHours(0,0,0,0);
document.getElementById('today').value = toISO(todayDate);

function toISO(d) {
  return d.toISOString().split('T')[0];
}

function parseDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function diffDays(a, b) {
  return Math.round((b - a) / 86400000);
}

function fmt(d) {
  return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtShort(d) {
  return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
}

function addRx() {
  counter++;
  const id = counter;
  items.push(id);
  refreshEmpty();

  const list = document.getElementById('rxList');
  const card = document.createElement('div');
  card.className = 'rx-card';
  card.id = `rx-${id}`;

  // Default last fill to today
  const defaultDate = document.getElementById('today').value;

  card.innerHTML = `
    <div class="field" style="flex:1">
      <div class="rx-num-tag">Rx #${id}</div>
      <label>Medication Name</label>
      <input type="text" id="name-${id}" placeholder="e.g. Metformin 500mg">
    </div>
    <div class="field">
      <label>Last Fill Date</label>
      <input type="date" id="date-${id}" value="${defaultDate}">
    </div>
    <div class="field">
      <label>Days Supply</label>
      <input type="number" id="supply-${id}" min="1" max="365" placeholder="90" style="width:100%">
    </div>
    <button class="btn-x" onclick="removeRx(${id})" title="Remove">×</button>
  `;
  list.appendChild(card);
}

function removeRx(id) {
  const idx = items.indexOf(id);
  if (idx > -1) items.splice(idx, 1);
  const card = document.getElementById(`rx-${id}`);
  if (card) {
    card.style.transition = 'all 0.18s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(10px)';
    setTimeout(() => card.remove(), 180);
  }
  setTimeout(refreshEmpty, 200);
  document.getElementById('results').style.display = 'none';
}

function refreshEmpty() {
  document.getElementById('emptyState').style.display = items.length === 0 ? 'block' : 'none';
}

function clearAll() {
  items.length = 0;
  counter = 0;
  document.getElementById('rxList').innerHTML = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('errMsg').style.display = 'none';
  refreshEmpty();
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function calculate() {
  document.getElementById('errMsg').style.display = 'none';

  const todayStr = document.getElementById('today').value;
  const grace = parseInt(document.getElementById('grace').value) || 10;

  if (items.length === 0) { showErr('Please add at least one prescription.'); return; }

  const today = parseDate(todayStr);
  const meds = [];

  for (const id of items) {
    const name = document.getElementById(`name-${id}`).value.trim() || `Rx #${id}`;
    const dateStr = document.getElementById(`date-${id}`).value;
    const supply = parseInt(document.getElementById(`supply-${id}`).value);

    if (!dateStr) { showErr(`"${name}": please enter a Last Fill Date.`); return; }
    if (!supply || supply < 1) { showErr(`"${name}": please enter a valid Days Supply.`); return; }

    const lastFill = parseDate(dateStr);
    const runsOut = addDays(lastFill, supply);
    const earliestFill = addDays(runsOut, -grace); // can fill up to 'grace' days early

    meds.push({ id, name, lastFill, supply, runsOut, earliestFill });
  }

  // Sort by earliest fill date
  meds.sort((a,b) => a.earliestFill - b.earliestFill);

  // ── ALGORITHM ──
  // 1. Find all natural "fill opportunities" starting from today:
  //    Each med defines an earliest fill date. Group meds that share a window.
  // 2. For each opportunity date (earliest fill of a med that's >= today),
  //    see which other meds can ALSO be filled then (their window overlaps).
  // 3. For meds that can't be filled at this opportunity, suggest a short fill
  //    so their NEXT refill aligns with the group's next date.
  // 4. Score opportunities by how many meds are in-window.
  // 5. Show the best opportunity (most meds) + next couple.

  // Candidate opportunity dates: each med's earliest fill date, filtered to >= today
  const candidateDates = meds
    .map(m => m.earliestFill < today ? today : m.earliestFill)
    .filter((d, i, arr) => arr.findIndex(x => x.getTime() === d.getTime()) === i);

  // Also include today if meds are overdue
  if (!candidateDates.find(d => d.getTime() === today.getTime())) {
    // check if any med is overdue
    if (meds.some(m => m.runsOut <= today)) {
      candidateDates.unshift(new Date(today));
    }
  }
  candidateDates.sort((a,b) => a-b);

  // For each candidate date, evaluate which meds are in-window
  const opportunities = candidateDates.map(fillDate => {
    const inWindow = [];
    const needShortFill = [];
    const future = [];

    for (const med of meds) {
      // A med can be filled on fillDate if fillDate >= med.earliestFill AND fillDate <= med.runsOut + grace
      // (we allow slightly past due too — pharmacy still fills it)
      const canFill = fillDate >= med.earliestFill || diffDays(med.runsOut, fillDate) <= grace;
      const isFuture = fillDate < med.earliestFill && diffDays(fillDate, med.earliestFill) > 0;

      if (canFill && !isFuture) {
        inWindow.push(med);
      } else {
        // This med can't be filled yet at fillDate.
        // Calculate a short fill so it expires near fillDate + supply (next round)
        // Short fill days = days from lastFill to fillDate = makes it run out on fillDate
        // But also, we want the NEXT fill after the short fill to land on a future unified date.
        needShortFill.push(med);
      }
    }

    return { fillDate, inWindow, needShortFill };
  });

  // Find best opportunity: most in-window meds
  opportunities.sort((a,b) => b.inWindow.length - a.inWindow.length || a.fillDate - b.fillDate);

  // Re-sort to show chronologically but highlight best
  const sorted = [...candidateDates].map(d => opportunities.find(o => o.fillDate.getTime() === d.getTime()));

  // Build unified sync point: the date when ALL meds can eventually align
  // After the best opportunity, project when all short-fill meds will land
  const best = opportunities[0]; // most meds

  // For each needShortFill in best opp, compute projected sync date (after short fill)
  // short fill: days from lastFill → fillDate (med runs out ON fillDate)
  // but min 1 day, and we want the NEXT fill to be at the unified date
  // The "unified date" after short fill = fillDate + stdSupply
  // Actually we want: after the short fill, the med's next run-out is close to the inWindow meds' next run-out.
  // inWindow meds next run out = fillDate + supply (their standard supply)
  // So short fill target = (fillDate + supply) - lastFill in days

  // Let's compute the recommended next sync date = fillDate + median supply of inWindow meds
  let nextSyncSupply = 90;
  if (best.inWindow.length > 0) {
    const supplies = best.inWindow.map(m => m.supply);
    supplies.sort((a,b)=>a-b);
    nextSyncSupply = supplies[Math.floor(supplies.length/2)];
  }
  const nextSyncDate = addDays(best.fillDate, nextSyncSupply);

  // Render
  const out = document.getElementById('results');
  out.innerHTML = '';
  out.style.display = 'block';

  // ── EXPLAIN BOX ──
  const totalInWindow = best.inWindow.length;
  const totalShort = best.needShortFill.length;

  const explainDiv = document.createElement('div');
  explainDiv.className = 'explain-box';
  explainDiv.innerHTML = `
    <strong>How this works:</strong> Your fill window opens <strong>${grace} days before</strong> a prescription runs out.
    The planner finds the soonest date where the most medications overlap in their fill windows.
    Medications that don't line up yet get a <strong>short fill</strong> — a reduced days supply so their
    <em>next</em> refill falls in sync with the rest.
  `;
  out.appendChild(explainDiv);

  // ── SUMMARY ──
  const sumDiv = document.createElement('div');
  sumDiv.className = 'summary';
  sumDiv.innerHTML = `
    <div class="sum-item">
      <div class="sum-val">${meds.length}</div>
      <div class="sum-label">Total Rx</div>
    </div>
    <div class="sum-item">
      <div class="sum-val">${totalInWindow}</div>
      <div class="sum-label">Fill Together</div>
    </div>
    <div class="sum-item">
      <div class="sum-val amber">${totalShort}</div>
      <div class="sum-label">Short Fill Needed</div>
    </div>
    <div class="sum-item">
      <div class="sum-val">${fmt(best.fillDate)}</div>
      <div class="sum-label">Sync Date</div>
    </div>
  `;
  out.appendChild(sumDiv);

  const slDiv = document.createElement('div');
  slDiv.className = 'sl';
  slDiv.style.marginTop = '32px';
  slDiv.textContent = 'Sync Plan';
  out.appendChild(slDiv);

  // ── MAIN OPPORTUNITY TABLE ──
  renderOpportunity(out, best, 0, true, nextSyncDate, today, grace, nextSyncSupply);

  // ── TIMELINE ──
  renderTimeline(out, meds, best.fillDate, nextSyncDate, today);

  out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderOpportunity(container, opp, idx, isBest, nextSyncDate, today, grace, nextSyncSupply) {
  const wrap = document.createElement('div');
  wrap.className = 'sync-opp';

  const daysFromToday = diffDays(today, opp.fillDate);
  const daysLabel = daysFromToday === 0 ? 'Today' : daysFromToday === 1 ? 'Tomorrow' : `In ${daysFromToday} days`;

  wrap.innerHTML = `
    <div class="opp-header">
      <div>
        <div class="opp-num">Sync Fill Date</div>
        <div class="opp-date">${fmt(opp.fillDate)}</div>
        <div class="opp-window">${daysLabel} · Fill window: ${fmtShort(opp.fillDate)} — ${fmtShort(addDays(opp.fillDate, grace))}</div>
      </div>
      <span class="opp-badge best">★ Optimal Sync Point</span>
    </div>
    <table class="opp-table">
      <thead>
        <tr>
          <th>Medication</th>
          <th>Last Filled</th>
          <th>Runs Out</th>
          <th>Action</th>
          <th>Recommended Days Supply</th>
          <th>Next Runs Out</th>
        </tr>
      </thead>
      <tbody id="opp-body-${idx}"></tbody>
    </table>
  `;

  container.appendChild(wrap);
  const tbody = document.getElementById(`opp-body-${idx}`);

  // Render in-window meds first, then short-fill meds
  const allRows = [
    ...opp.inWindow.map(m => ({ med: m, type: 'window' })),
    ...opp.needShortFill.map(m => ({ med: m, type: 'short' }))
  ];

  // Sort back to original order
  allRows.sort((a,b) => {
    const ai = opp.inWindow.indexOf(a.med) >= 0 ? 0 : 1;
    const bi = opp.inWindow.indexOf(b.med) >= 0 ? 0 : 1;
    return ai - bi || a.med.runsOut - b.med.runsOut;
  });

  for (const { med, type } of allRows) {
    const tr = document.createElement('tr');

    if (type === 'window') {
      // In-window: fill full supply
      const nextRunsOut = addDays(opp.fillDate, med.supply);
      tr.className = 'in-window';
      tr.innerHTML = `
        <td><div class="med-name">${med.name}</div></td>
        <td class="date-cell">${fmtShort(med.lastFill)}</td>
        <td class="date-cell">${fmtShort(med.runsOut)}</td>
        <td><span class="status-dot green"></span> Fill now</td>
        <td>
          <span class="fill-pill standard">${med.supply}d</span>
          <div class="fill-sub">Full supply — in sync</div>
        </td>
        <td class="date-cell">${fmtShort(nextRunsOut)}</td>
      `;
    } else {
      // Short fill: fill just enough so next refill lands near nextSyncDate
      // Short fill days = nextSyncDate - opp.fillDate = would make it expire on nextSyncDate  ... no
      // Short fill = days needed so the med expires near opp.fillDate + nextSyncSupply
      // i.e. fill enough days from lastFill to reach opp.fillDate, then next fill is full supply
      // Actually: short fill days = diffDays(lastFill → opp.fillDate)
      // But med might not be due yet, so we can't fill it on opp.fillDate.
      // Instead, we fill it on its earliest fill date with a short supply.
      // Short fill = days so it expires on opp.fillDate + standard supply (nextSyncDate)
      // shortFillDays = diffDays(med.lastFill, nextSyncDate) - med.supply (no, that's wrong)
      // 
      // The med's earliest fill is AFTER opp.fillDate. We can't fill it early.
      // Instead: fill on its next earliest window with a SHORT supply so that next refill aligns.
      // nextSyncDate is opp.fillDate + nextSyncSupply
      // To run out on nextSyncDate: fill on earliestFill with supply = diffDays(earliestFill, nextSyncDate)
      // But if earliestFill < today → fill today

      const fillOn = med.earliestFill < today ? today : med.earliestFill;
      const shortDays = Math.max(1, diffDays(fillOn, nextSyncDate));
      const nextRunsOut = addDays(fillOn, shortDays);
      const saved = med.supply - shortDays;

      tr.className = 'short-fill';
      tr.innerHTML = `
        <td><div class="med-name">${med.name}</div></td>
        <td class="date-cell">${fmtShort(med.lastFill)}</td>
        <td class="date-cell">${fmtShort(med.runsOut)}</td>
        <td><span class="status-dot amber"></span> Fill on ${fmtShort(fillOn)}</td>
        <td>
          <span class="fill-pill short">${shortDays}d</span>
          <div class="fill-sub">Short fill (saves ${saved < 0 ? 0 : saved}d) · aligns to sync</div>
        </td>
        <td class="date-cell">${fmtShort(nextRunsOut)} ≈ sync</td>
      `;
    }

    tbody.appendChild(tr);
  }
}

function renderTimeline(container, meds, syncDate, nextSyncDate, today) {
  const slDiv = document.createElement('div');
  slDiv.className = 'sl';
  slDiv.style.marginTop = '32px';
  slDiv.textContent = 'Timeline View';
  container.appendChild(slDiv);

  const wrap = document.createElement('div');
  wrap.className = 'timeline-wrap';

  // Time range: today to nextSyncDate + 30 days
  const rangeStart = new Date(today);
  const rangeEnd = addDays(nextSyncDate, 30);
  const totalDays = diffDays(rangeStart, rangeEnd);

  function pct(d) {
    const days = diffDays(rangeStart, d);
    return Math.max(0, Math.min(100, (days / totalDays) * 100));
  }

  let html = `<div class="timeline-title">From today through sync convergence</div>`;

  for (const med of meds) {
    const startPct = pct(med.lastFill);
    const endPct = pct(med.runsOut);
    const width = Math.max(1, endPct - startPct);
    const syncStartPct = pct(syncDate);
    const syncEndPct = pct(nextSyncDate);
    const syncWidth = Math.max(1, syncEndPct - syncStartPct);

    html += `
      <div class="tl-row">
        <div class="tl-name" title="${med.name}">${med.name}</div>
        <div class="tl-bar-wrap">
          <div class="tl-bar current" style="left:${startPct}%;width:${width}%">${med.supply}d</div>
          <div class="tl-bar synced" style="left:${syncStartPct}%;width:${syncWidth}%">→ ${med.supply}d</div>
        </div>
      </div>
    `;
  }

  // Add axis markers
  const todayPct = 0;
  const syncPct = pct(syncDate);
  const nextPct = pct(nextSyncDate);

  html += `
    <div style="position:relative;height:20px;margin-left:172px;">
      <div style="position:absolute;left:${todayPct}%;font-size:0.55rem;color:var(--ink-3);transform:translateX(-50%)">TODAY</div>
      <div style="position:absolute;left:${syncPct}%;font-size:0.55rem;color:var(--green);transform:translateX(-50%)">${fmtShort(syncDate)}</div>
      <div style="position:absolute;left:${nextPct}%;font-size:0.55rem;color:var(--green);transform:translateX(-50%)">${fmtShort(nextSyncDate)}</div>
    </div>
  `;

  wrap.innerHTML = html;
  container.appendChild(wrap);
}

// ── LOAD EXAMPLES ──
function loadExamples() {
  const examples = [
    { name: 'Metformin 500mg', daysAgo: 75, supply: 90 },
    { name: 'Lisinopril 10mg', daysAgo: 20, supply: 30 },
    { name: 'Atorvastatin 40mg', daysAgo: 50, supply: 90 },
  ];
  const today = parseDate(document.getElementById('today').value);
  examples.forEach(ex => {
    addRx();
    const id = counter;
    document.getElementById(`name-${id}`).value = ex.name;
    const fillDate = addDays(today, -ex.daysAgo);
    document.getElementById(`date-${id}`).value = toISO(fillDate);
    document.getElementById(`supply-${id}`).value = ex.supply;
  });
}
